# ??????
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true

# ??? MySQL8.0
spring:
  # ???
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/todo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: root
  data:
    # Redis??
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3000ms
  # ??????
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  # ??????
  task:
    scheduling:
      pool:
        size: 5

# MyBatis ??
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.org.todo.todosystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ???JWT??
jwt:
  secret: todo-system-secret-key-2026-spring-boot-jwt
  expiration: 86400000 # 1????????

# ??????????
upload:
  path: E:/upload/todo/avatar/